name: Protocol Compliance Checks

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PR body for provenance marker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          missing_provenance=false

          if [ -z "$PR_BODY" ]; then
            missing_provenance=true
          fi

          if ! printf '%s\n' "$PR_BODY" | grep -qE '^[[:space:]]*##[[:space:]]+Agent Provenance[[:space:]]*$'; then
            missing_provenance=true
          fi

          for key in 'run-id:' 'task-id:' 'role:' 'dispatched:'; do
            if ! printf '%s\n' "$PR_BODY" | grep -qE "^[[:space:]]*${key}[[:space:]]*"; then
              missing_provenance=true
            fi
          done

          if [ "$missing_provenance" = true ]; then
            echo "::warning::PR body missing ## Agent Provenance block or required provenance fields (run-id:, task-id:, role:, dispatched:)"
          fi

      - name: Check PR body for issue-closing keyword
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s' "$PR_BODY" | grep -qiE "(closes|fixes|resolves) #[0-9]+"; then
            echo "::warning::PR body missing issue-closing keyword"
          fi

      - name: Check slice artifact completeness
        run: |
          shopt -s nullglob
          for dir in docs/slices/*/; do
            slice=$(basename "$dir")
            for f in 01-requirement.md 02-prd.md 03-ux.md 04-design-qa.md 05-architecture.md 06-tasks.md; do
              if [ ! -f "$dir$f" ]; then
                echo "::notice::Slice '$slice' missing $f (may be in-progress)"
              fi
            done
          done
