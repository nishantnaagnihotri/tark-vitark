name: Feature Slice Intake
description: Create a feature slice issue with required functional requirement traceability.
title: "[Slice]: "
labels:
  - slice
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new feature slices.

        Source-of-truth docs:
        - docs/functional-requirements-index.md
        - docs/functional-requirements-template.md
        - docs/non-functional-requirements-baseline.md
        - docs/requirements-lifecycle.md

        Issue structure rule:
        - Keep a compact in-scope FR ID summary near the top.
        - Keep a detailed FR-to-AC Traceability Matrix in the issue body.

  - type: textarea
    id: requirement_ids
    attributes:
      label: In-Scope Requirement IDs (Top Summary)
      description: Keep this compact for quick triage and handoff. Use IDs like FR-debate-screen-001.
      placeholder: |
        FR-debate-screen-001
        FR-debate-screen-002
    validations:
      required: true

  - type: input
    id: slice_requirements_spec_link
    attributes:
      label: Slice Requirements Spec Link
      description: Link to docs/functional-requirements-*.md for this slice.
      placeholder: https://github.com/<org>/<repo>/blob/<branch>/docs/functional-requirements-<slice>.md
    validations:
      required: true

  - type: input
    id: requirements_index_link
    attributes:
      label: Requirements Index Link
      description: Link to the exact row/update in docs/functional-requirements-index.md (commit or PR link is acceptable).
      placeholder: https://github.com/<org>/<repo>/blob/<branch>/docs/functional-requirements-index.md
    validations:
      required: true

  - type: textarea
    id: nfr_baseline_ack
    attributes:
      label: NFR Baseline Inheritance
      description: Confirm baseline inheritance and record any slice-specific NFR additions/exceptions.
      placeholder: |
        Baseline inherited from docs/non-functional-requirements-baseline.md: Yes
        Slice-specific additions:
        -
        Exceptions (if any, with rationale):
        -
    validations:
      required: true

  - type: textarea
    id: problem_outcome
    attributes:
      label: Problem and User Outcome
      description: What user problem are we solving and what outcome should improve?
      placeholder: |
        Problem:
        Target user:
        Desired outcome:
        Success metric(s):
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope (In and Out)
      description: Keep scope boundaries explicit to avoid drift.
      placeholder: |
        In scope:
        -

        Out of scope:
        -
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List clear, testable acceptance criteria.
      placeholder: |
        AC-1:
        AC-2:
        AC-3:
    validations:
      required: true

  - type: textarea
    id: traceability_matrix
    attributes:
      label: Traceability Matrix
      description: Map FR IDs to behavior and AC IDs.
      placeholder: |
        | FR ID | Behavior | Linked AC IDs | Test Evidence |
        |---|---|---|---|
        | FR-... | ... | AC-... | TBD |
    validations:
      required: true

  - type: input
    id: ux_spec_link
    attributes:
      label: UX Spec Link
      description: Link UX spec if available now. If pending, enter TBD and update at UX Gate.
      placeholder: https://github.com/<org>/<repo>/blob/<branch>/docs/ux-spec-<slice>.md or TBD
    validations:
      required: true

  - type: input
    id: figma_link
    attributes:
      label: Figma Link or Waiver
      description: "Provide Figma file/frame link. If not needed, enter: Figma not required for this slice - <reason>."
      placeholder: https://www.figma.com/file/... or Figma not required for this slice - low-risk backend-only change
    validations:
      required: true

  - type: dropdown
    id: readiness
    attributes:
      label: Plan Gate Readiness
      description: Select current requirement readiness.
      options:
        - Proposed
        - Approved
    validations:
      required: true

  - type: checkboxes
    id: policy_ack
    attributes:
      label: Policy Acknowledgement
      options:
        - label: I confirm repo docs are the requirements source of truth, and this issue is an execution tracker.
          required: true
        - label: I confirm this issue references the same requirement IDs used in implementation and QA evidence.
          required: true
