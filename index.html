<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TarkVitark — Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0533 0%, #2d0b5e 40%, #0d2b6e 100%);
      font-family: Georgia, 'Times New Roman', serif;
      color: #ffffff;
      padding: 2rem 1rem;
      text-align: center;
      overflow-x: hidden;
    }

    .splash {
      max-width: 680px;
      width: 100%;
    }

    /* Decorative top accent */
    .accent-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .accent-bar span {
      display: block;
      height: 6px;
      border-radius: 3px;
    }

    .accent-bar .accent-orange  { width: 60px;  background: #ff6b35; }
    .accent-bar .accent-yellow  { width: 90px;  background: #f7c948; }
    .accent-bar .accent-teal    { width: 120px; background: #00d4aa; }
    .accent-bar .accent-yellow2 { width: 90px;  background: #f7c948; }
    .accent-bar .accent-orange2 { width: 60px;  background: #ff6b35; }

    /* Logo / brand name */
    .brand {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      background: linear-gradient(90deg, #ff6b35 0%, #f7c948 50%, #00d4aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-style: italic;
      color: #c5a6ff;
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
    }

    /* Divider */
    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #ff6b35, #f7c948, #00d4aa);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    /* Coming soon badge */
    .coming-soon {
      display: inline-block;
      font-size: clamp(1.4rem, 6vw, 2.5rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.6em 1.4em;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      color: #1a0533;
      box-shadow: 0 4px 30px rgba(255, 107, 53, 0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);     box-shadow: 0 4px 30px rgba(255, 107, 53, 0.5); }
      50%       { transform: scale(1.04); box-shadow: 0 8px 40px rgba(247, 201, 72, 0.7); }
    }

    /* Decorative bottom dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 3rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot:nth-child(1) { background: #ff6b35; }
    .dot:nth-child(2) { background: #f7c948; }
    .dot:nth-child(3) { background: #00d4aa; }
    .dot:nth-child(4) { background: #c5a6ff; }
    .dot:nth-child(5) { background: #ff6b35; }

    /* Responsive adjustments for narrow mobile */
    @media (max-width: 400px) {
      .accent-bar .accent-orange,  .accent-bar .accent-orange2  { width: 30px; }
      .accent-bar .accent-yellow,  .accent-bar .accent-yellow2  { width: 50px; }
      .accent-bar .accent-teal                                   { width: 70px; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="accent-bar" aria-hidden="true">
      <span class="accent-orange"></span>
      <span class="accent-yellow"></span>
      <span class="accent-teal"></span>
      <span class="accent-yellow2"></span>
      <span class="accent-orange2"></span>
    </div>

    <h1 class="brand">TarkVitark</h1>
    <p class="tagline">A debate platform</p>

    <div class="divider" aria-hidden="true"></div>

    <p class="coming-soon">Coming Soon!!</p>

    <div class="dots" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
